<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BharatPe - GrowX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f7fa;
color:#222;
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:20px;
font-weight:600;
color:#0b5fff;
}

.card{
background:#ffffff;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
border:1px solid #e8eef7;
}

.card h3{
color:#0b5fff;
margin-bottom:10px;
}

.qr img{
width:300px;
max-width:100%;
margin:15px 0;
border-radius:12px;
border:2px solid #eef3ff;
}

p{
color:#555;
margin-bottom:10px;
}

.input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:1px solid #d9e2f2;
background:#fff;
color:#222;
outline:none;
}

.input:focus{
border-color:#0b5fff;
}

.submit{
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:12px;
background:#0b5fff;
color:white;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.submit:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div>BharatPe</div>
<div>Grow<span style="color:#0b5fff;">X</span></div>
</div>

<div class="card">

<h3>Scan & Pay</h3>

<div class="qr">
<img src="air.png" alt="BharatPe QR">
</div>

<p>UPI ID: BHARATPE2S0D0N4G6L34016@unitype</p>

<input id="amount" class="input" placeholder="Enter Amount (₹50 min)">
<input id="utr" class="input" placeholder="Enter UTR">

<button class="submit" onclick="submitPayment()">Submit Payment</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */
const supabaseClient = window.supabase.createClient(
"https://sgabwjdydpdhjhzgncmq.supabase.co",
"sb_publishable_uGNWbH6gSVTBbTRotRGXQQ_a7n_mtzb"
);

/* USER */
const userID = localStorage.getItem("userID");

/* METHOD */
const method = localStorage.getItem("PAYMENT_METHOD") || "BharatPe";

/* PAY */
function payUPI(){
let amount=document.getElementById("amount").value;

if(!amount){
alert("Enter amount");
return;
}

let upi=`upi://pay?pa=ravikishanm90@fam&pn=GrowX&am=${amount}&cu=INR`;
window.location.href=upi;
}

/* SUBMIT */
async function submitPayment(){

let amount=document.getElementById("amount").value.trim();
let utr=document.getElementById("utr").value.trim();

if(!amount || !utr){
alert("Fill all fields");
return;
}

if(Number(amount) < 50){
alert("Minimum ₹50");
return;
}

let {data:check} = await supabaseClient
.from("PAYMENT")
.select("*")
.eq("UTR", utr);

if(check.length > 0){
alert("Duplicate UTR ❌");
return;
}

await supabaseClient.from("PAYMENT").insert([{
USERID:userID,
AMOUNT:amount,
UTR:utr,
METHOD:method,
STATUS:"Pending",
DATE:new Date()
}]);

alert("Payment Submitted ✅");

setTimeout(()=>{
window.location.href="wallet.html";
},1000);

}

</script>

</body>
