<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamPay - GrowX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:radial-gradient(circle,#3a2a00,#020814);
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.container{width:100%;max-width:420px;}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:25px;
backdrop-filter:blur(20px);
box-shadow:0 0 30px rgba(255,215,0,.7);
text-align:center;
}

.qr img{
width:300px;
margin:15px 1;
border-radius:12px;
box-shadow:0 0 20px rgba(255,215,0,.9);
}

.input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.2);
background:transparent;
color:white;
}

.submit{
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ffd700,#ffb300);
color:black;
font-weight:600;
cursor:pointer;
}

.submit:hover{
box-shadow:0 0 15px #ffd700;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div>FamPay</div>
<div>Grow<span style="color:#ffd700;">X</span></div>
</div>

<div class="card">

<h3>Scan & Pay</h3>

<div class="qr">
<img src="fam.png">
</div>

<p>UPI ID: ravikishanm90@fam</p>

<input id="amount" class="input" placeholder="Enter Amount (₹50 min)">
<input id="utr" class="input" placeholder="Enter UTR">


<button class="submit" onclick="submitPayment()">Submit Payment</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */
const supabaseClient = window.supabase.createClient(
"https://sgabwjdydpdhjhzgncmq.supabase.co",
"sb_publishable_uGNWbH6gSVTBbTRotRGXQQ_a7n_mtzb"
);

/* USER */
const userID = localStorage.getItem("userID");

/* METHOD */
const method = localStorage.getItem("PAYMENT_METHOD") || "FamPay";

/* PAY */
function payUPI(){
let amount=document.getElementById("amount").value;
if(!amount){
alert("Enter amount");
return;
}
let upi=`upi://pay?pa=ravikishanm90@fam&pn=GrowX&am=${amount}&cu=INR`;
window.location.href=upi;
}

/* SUBMIT */
async function submitPayment(){

let amount=document.getElementById("amount").value.trim();
let utr=document.getElementById("utr").value.trim();

if(!amount||!utr){
alert("Fill all fields");
return;
}

if(Number(amount)<50){
alert("Minimum ₹50");
return;
}

/* DUPLICATE CHECK */
let {data:check}=await supabaseClient
.from("PAYMENT")
.select("*")
.eq("UTR",utr);

if(check.length>0){
alert("Duplicate UTR ❌");
return;
}

/* INSERT */
await supabaseClient.from("PAYMENT").insert([{
USERID:userID,
AMOUNT:amount,
UTR:utr,
METHOD:method,
STATUS:"Pending",
DATE:new Date()
}]);

alert("Payment Submitted ✅");

setTimeout(()=>{
window.location.href="select-payment.html";
},1000);

}

</script>

</body>
</html>
