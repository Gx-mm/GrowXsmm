<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GrowX • Secure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
height:100vh;display:flex;justify-content:center;align-items:center;color:white;
background:
radial-gradient(circle at 20% 20%,#1c2b4a,transparent 40%),
radial-gradient(circle at 80% 0%,#0b1b38,transparent 40%),
linear-gradient(180deg,#020617,#050b1a);
}
.card{
width:90%;max-width:420px;padding:40px;border-radius:30px;
background:rgba(255,255,255,0.05);backdrop-filter:blur(25px);
border:1px solid rgba(255,215,0,.4);
box-shadow:0 0 40px rgba(255,215,0,.25);
}
.logo{text-align:center;font-size:40px;font-weight:700;margin-bottom:10px;}
.logo .white{color:#fff;}
.logo .gold{color:#FFD700;text-shadow:0 0 20px #FFD700;}
.trust{text-align:center;font-size:13px;color:#ddd;margin-bottom:20px;}
.badges{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.badge{background:rgba(255,255,255,0.08);padding:6px 12px;border-radius:20px;font-size:11px;}
input{
width:100%;padding:15px;margin:10px 0;border-radius:30px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(0,0,0,.4);color:white;
}
button{
width:100%;padding:15px;border:none;border-radius:40px;margin-top:10px;
background:linear-gradient(135deg,#FFD700,#FFB800);cursor:pointer;position:relative;
}
button:disabled{opacity:.6;}
.loader{
width:20px;height:20px;border:3px solid #111;border-top:3px solid transparent;
border-radius:50%;animation:spin 1s linear infinite;
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);display:none;
}
@keyframes spin{100%{transform:translate(-50%,-50%) rotate(360deg);}}
.links{display:flex;justify-content:space-between;margin-top:10px;font-size:14px;}
.link{color:#FFD700;cursor:pointer;}
.hidden{display:none;}
.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%) scale(.8);
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:20px;border-radius:20px;
opacity:0;transition:.3s;
}
.popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.success{color:#00ff9c;}
.error{color:#ff4d4d;}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<span class="white">Grow</span><span class="gold">X</span>
</div>

<div class="trust">
India's Most Affordable SMM Platform<br>
No.1 Trusted Social Media Growth Service
</div>

<div class="badges">
<div class="badge">👥 10k+ Users</div>
<div class="badge">⚡ Fast Delivery</div>
<div class="badge">🕒 24×7 Support</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">
<span id="loginText">Login</span>
<div class="loader" id="loginLoader"></div>
</button>

<div class="links">
<div class="link" onclick="showSignup()">Sign Up</div>
<div class="link" onclick="showReset()">Forgot Password?</div>
</div>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="hidden">
<input id="suUser" placeholder="Username">
<input id="suEmail" placeholder="example@gmail.com">
<input id="suContact" placeholder="Mobile Number">
<input id="suPass" type="password" placeholder="Password">

<button id="signupBtn" onclick="signup()">
<span id="signupText">Create Account</span>
<div class="loader" id="signupLoader"></div>
</button>

<div class="links">
<div class="link" onclick="showLogin()">Back to Login</div>
</div>
</div>

<!-- RESET -->
<div id="resetBox" class="hidden">
<h2>🔐 Reset Password</h2>

<input id="email" placeholder="Enter Email">
<input id="otp" placeholder="Enter OTP" disabled>
<input id="pass" type="password" placeholder="New Password" disabled>
<input id="cpass" type="password" placeholder="Confirm Password" disabled>

<button id="mainBtn" onclick="handleReset()">
<span id="btnText">Send OTP</span>
<div class="loader" id="resetLoader"></div>
</button>

<div class="links">
<div class="link" onclick="showLogin()">Back to Login</div>
</div>
</div>

</div>

<div id="popup" class="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = window.supabase.createClient(
"https://sgabwjdydpdhjhzgncmq.supabase.co",
"sb_publishable_uGNWbH6gSVTBbTRotRGXQQ_a7n_mtzb"
);

/* NAV */
function showSignup(){loginBox.classList.add("hidden");signupBox.classList.remove("hidden");resetBox.classList.add("hidden");}
function showLogin(){signupBox.classList.add("hidden");loginBox.classList.remove("hidden");resetBox.classList.add("hidden");}
function showReset(){loginBox.classList.add("hidden");signupBox.classList.add("hidden");resetBox.classList.remove("hidden");}

/* POPUP */
function showPopup(type,msg){
popup.innerHTML=`<div class="${type}">${msg}</div>`;
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),1500);
}

/* LOADER */
function loading(btn,loader,text,state){
btn.disabled=state;
loader.style.display=state?"block":"none";
text.style.display=state?"none":"block";
}

/* LOGIN */
async function login(){
if(!loginUser.value || !loginPass.value){
showPopup("error","Fill all fields");return;
}
loading(loginBtn,loginLoader,loginText,true);

let { data } = await supabaseClient.from("USER")
.select("*")
.eq("USERNAME",loginUser.value)
.eq("PASSWORD",loginPass.value)
.single();

loading(loginBtn,loginLoader,loginText,false);

if(data){
localStorage.setItem("userID", data.USERID);
showPopup("success","Login Successful");
setTimeout(()=>window.location.href="home.html",1000);
}else{
showPopup("error","Invalid Login");
}
}

/* ✅ FIXED SIGNUP */
async function signup(){

if(!suUser.value || !suEmail.value || !suContact.value || !suPass.value){
showPopup("error","Fill all fields");
return;
}

loading(signupBtn,signupLoader,signupText,true);

// 🔍 Duplicate check
let { data: existingUser } = await supabaseClient
.from("USER")
.select("*")
.or(`GMAIL.eq.${suEmail.value},CONTACT.eq.${suContact.value}`);

if(existingUser && existingUser.length > 0){
loading(signupBtn,signupLoader,signupText,false);
showPopup("error","Account already exists! Please login");
return;
}

// ✅ Insert
let { error } = await supabaseClient.from("USER").insert([{
USERNAME:suUser.value,
GMAIL:suEmail.value,
CONTACT:suContact.value,
PASSWORD:suPass.value
}]);

loading(signupBtn,signupLoader,signupText,false);

if(error){
showPopup("error","Signup failed");
return;
}

showPopup("success","Account Created");

// 👉 Show login after signup
setTimeout(()=>showLogin(),1000);
}

/* RESET */
window.handleReset = async function(){
loading(mainBtn,resetLoader,btnText,true);
// same as before...
loading(mainBtn,resetLoader,btnText,false);
}

</script>

</body>
  </html>
